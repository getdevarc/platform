openapi: 3.0.3

info:
  title: DevArc API
  description: |
    AI-powered career copilot for developers.
    
    ## Authentication
    Most endpoints require a Bearer JWT token in the `Authorization` header.
    Obtain the token via `POST /auth/login`.
    
    ## Rate Limiting
    AI endpoints (`/ai/*`) are rate-limited. Exceeding limits returns HTTP 429.
    
    ## Response Format
    All responses follow a consistent envelope:
    ```json
    { "success": true/false, "data": {...} | null, "error": "message" | null }
    ```
  version: 1.0.0
  contact:
    name: DevArc
    url: https://getdevarc.com

# ─── SERVERS ────────────────────────────────────────────────────────────────
servers:
  - url: http://localhost:5050
    description: Local Development

# ─── TAGS ───────────────────────────────────────────────────────────────────
tags:
  - name: Health
    description: Service health check
  - name: Auth
    description: Register and login
  - name: Submissions
    description: Code submission and scoring
  - name: AI
    description: AI-powered coaching (Hints, Explain, Review)
  - name: Interview
    description: Track-aware AI mock interviews with PDF reporting
  - name: Career
    description: Onboarding and personalized roadmaps

# ─── REUSABLE COMPONENTS ────────────────────────────────────────────────────
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    SuccessEnvelope:
      type: object
      properties:
        success: { type: boolean, example: true }
        data: { type: object, nullable: true }
        error: { type: string, nullable: true, example: null }

    ErrorEnvelope:
      type: object
      properties:
        success: { type: boolean, example: false }
        data: { type: object, nullable: true, example: null }
        error: { type: string, example: "Error message here" }

    # ── Auth ──
    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name: { type: string, example: Aman }
        email: { type: string, format: email, example: aman@test.com }
        password: { type: string, minLength: 6, example: "123456" }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email, example: aman@test.com }
        password: { type: string, example: "123456" }

    # ── Submissions ──
    SubmitCodeRequest:
      type: object
      required: [problemId, sourceCode, sessionId]
      properties:
        problemId: { type: string, format: uuid }
        sourceCode: { type: string }
        languageId: { type: integer, example: 63 }
        sessionId: { type: string, format: uuid }

    # ── AI ──
    AIProblemRequest:
      type: object
      required: [problemId, userCode, sessionId]
      properties:
        problemId: { type: string, format: uuid }
        userCode: { type: string }
        sessionId: { type: string, format: uuid }

    # ── Interview ──
    InterviewStartRequest:
      type: object
      required: [type]
      properties:
        type: { type: string, enum: [DSA, System Design, Frontend, Frameworks], example: DSA }

    # ── Career ──
    OnboardingRequest:
      type: object
      required: [role, target_domain, answers]
      properties:
        role: { type: string, example: "Fresher" }
        target_domain: { type: string, example: "Full Stack" }
        answers: { type: array, items: { type: string } }

# ─── PATHS ──────────────────────────────────────────────────────────────────
paths:

  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        "200":
          description: API is running
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterRequest" }
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /auth/login:
    post:
      tags: [Auth]
      summary: Login and get JWT
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /onboarding/resume:
    post:
      tags: [Career]
      summary: Upload resume for AI analysis
      security: [{ BearerAuth: [] }]
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                resume: { type: string, format: binary }
      responses:
        "200":
          description: Resume analyzed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /onboarding/complete:
    post:
      tags: [Career]
      summary: Complete onboarding and generate roadmap
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OnboardingRequest" }
      responses:
        "200":
          description: Roadmap generated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /ai/hint:
    post:
      tags: [AI]
      summary: Get AI hint (deducts 20 points from session score)
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AIProblemRequest" }
      responses:
        "200":
          description: Hint returned
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /interview/start:
    post:
      tags: [Interview]
      summary: Start track-aware mock interview
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InterviewStartRequest" }
      responses:
        "200":
          description: Interview started
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /interview/message:
    post:
      tags: [Interview]
      summary: Send message to AI interviewer
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                interviewId: { type: string, format: uuid }
                message: { type: string }
      responses:
        "200":
          description: AI response returned
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }

  /interview/finish:
    post:
      tags: [Interview]
      summary: End interview and generate professional evaluation/PDF
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                interviewId: { type: string, format: uuid }
      responses:
        "200":
          description: Evaluation complete
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuccessEnvelope" }