name: DevArc SSM Smoke Test

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  ssm-smoke-test:
    name: Run SSM Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::057462648032:role/DevArcGitHubActionsCDRole
          aws-region: ap-south-1

      - name: Send SSM Command
        id: send-command
        run: |
          cmd_json=$(aws ssm send-command \
            --instance-ids "i-0f938e172e2e57482" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["echo \"### DEVARC SSM SMOKE TEST ###\"","hostname","date -u","docker ps --format \"table {{.Names}}  {{.Status}}\"","curl -fsS http://127.0.0.1:5050/health"]}')
          
          command_id=$(echo "$cmd_json" | jq -r '.Command.CommandId')
          echo "command_id=$command_id" >> "$GITHUB_OUTPUT"
          echo "Dispatched SSM Command ID: $command_id"

      - name: Validate Command ID
        run: |
          command_id="${{ steps.send-command.outputs.command_id }}"
          
          if [ -z "$command_id" ] || [ "$command_id" = "null" ]; then
            echo "Error: Command ID is empty or null!"
            exit 1
          fi

      - name: Wait for SSM Command Completion
        run: |
          echo "Waiting for command ${{ steps.send-command.outputs.command_id }} to execute..."
          aws ssm wait command-executed \
            --command-id "${{ steps.send-command.outputs.command_id }}" \
            --instance-id "i-0f938e172e2e57482"

      - name: Get Command Invocation Output
        run: |
          invocation=$(aws ssm get-command-invocation \
            --command-id "${{ steps.send-command.outputs.command_id }}" \
            --instance-id "i-0f938e172e2e57482")
          
          status=$(echo "$invocation" | jq -r '.Status')
          stdout=$(echo "$invocation" | jq -r '.StandardOutputContent')
          stderr=$(echo "$invocation" | jq -r '.StandardErrorContent')
          
          echo "=== Invocation Status ==="
          echo "$status"
          echo "=== Standard Output ==="
          echo "$stdout"
          echo "=== Standard Error ==="
          echo "$stderr"
          
          if [ "$status" != "Success" ]; then
            echo "Error: SSM Command failed with status $status"
            exit 1
          fi
