name: Backend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  backend-validation:
    name: Backend validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Audit dependencies
        run: npm audit --audit-level=high
        working-directory: backend

      - name: Verify JavaScript syntax
        run: |
          find src -name "*.js" | xargs -I {} node --check {}
          node --check run_migrations.js
        working-directory: backend

  backend-docker-test:
    name: Backend Docker verification
    runs-on: ubuntu-latest
    needs: backend-validation
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t dework-backend:test -f backend/Dockerfile backend

      - name: Run database migrations
        run: |
          docker run --network=host --env DATABASE_URL=postgres://postgres:postgres@localhost:5432/postgres dework-backend:test node run_migrations.js

      - name: Run container
        run: |
          docker run -d --name dework-backend-run --network=host -p 5050:5050 \
            --env DATABASE_URL=postgres://postgres:postgres@localhost:5432/postgres \
            --env JWT_SECRET=testsecret \
            --env GROQ_API_KEY=testkey \
            --env JUDGE0_API_KEY=testkey \
            dework-backend:test

      - name: Verify liveness (health check)
        run: |
          sleep 3
          curl -f -v http://localhost:5050/health

      - name: Verify non-root user execution
        run: |
          docker exec dework-backend-run whoami | grep "node"

      - name: Verify graceful shutdown (SIGTERM)
        run: |
          docker kill --signal=SIGTERM dework-backend-run
          exit_code=$(docker wait dework-backend-run)
          echo "Exit code: $exit_code"
          if [ "$exit_code" -ne 0 ]; then
            echo "Container did not exit gracefully (code $exit_code)"
            exit 1
          fi
